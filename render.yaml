services:
  - type: web
    name: esl-platform
    env: python
    plan: starter          # $7/mo — always on, persistent disk
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python tools/seed_db.py && python tools/seed_students.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: esl-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # Set these manually in the Render dashboard after deploy:
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

databases:
  - name: esl-db
    plan: starter          # $7/mo — persistent, no 90-day expiry
    databaseName: esl
    user: esl_user
